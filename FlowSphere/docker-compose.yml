version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: flowsphere-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: flowsphere_admin
      POSTGRES_PASSWORD: flowsphere_password
      POSTGRES_DB: flowsphere_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowsphere_admin"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowsphere-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
